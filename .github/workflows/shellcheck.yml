name: ShellCheck

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on SteamOS-Pamac-Installer.sh
        run: |
          shellcheck -x -s bash \
            -e SC2034 \
            -e SC2317 \
            SteamOS-Pamac-Installer.sh

      - name: Run ShellCheck on tests
        run: |
          find tests/ -name '*.sh' -exec shellcheck -x -s bash {} + 2>/dev/null || true
